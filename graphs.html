<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVisualizer - Graph Algorithms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-gray-100 font-sans h-screen flex flex-col overflow-hidden relative transition-colors duration-300">

    <!-- Animated Landing Hero Overlay -->
    <div id="landing-hero" class="absolute inset-0 z-[100] bg-white dark:bg-gray-900 flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="text-center relative z-10 px-4">
            <div class="w-24 h-24 bg-purple-600 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-2xl shadow-purple-500/50">
                <i class="fas fa-project-diagram text-5xl text-white"></i>
            </div>
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
                Graph Algorithms
            </h1>
            <p class="text-xl md:text-2xl text-gray-600 dark:text-gray-400 mb-8 max-w-2xl mx-auto">
                Coming soon! Advanced visualization for BFS, DFS, Dijkstra, A*, and Minimum Spanning Trees.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button id="enter-app-btn" class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 px-8 rounded-full shadow-lg shadow-purple-500/30 transition-transform transform hover:scale-105 text-lg flex items-center justify-center">
                    <i class="fas fa-eye mr-3"></i> View Sneak Peek
                </button>
            </div>
        </div>

        <!-- Background decorative elements -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
             <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-600/10 rounded-full blur-3xl"></div>
             <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl"></div>
        </div>
    </div>

    <!-- Navbar injected by Navbar.js -->

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-80 bg-gray-50 dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col shadow-lg z-10 overflow-y-auto transition-colors duration-300">
             <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <h2 class="text-sm uppercase text-gray-500 dark:text-gray-400 font-semibold mb-4">Configuration</h2>
                <div class="mb-5">
                    <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Algorithm</label>
                    <select id="algorithm-select" class="w-full bg-white dark:bg-gray-700 text-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-blue-500 transition-colors">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="merge">Merge Sort</option>
                        <option value="quick">Quick Sort</option>
                        <option value="heap">Heap Sort</option>
                        <option value="radix">Radix Sort</option>
                        <option value="linear">Linear Search</option>
                        <option value="binary">Binary Search</option>
                        <option value="reverse">Reverse Array (2 Pointers)</option>
                    </select>
                </div>
                <div class="mb-5">
                    <div class="flex justify-between mb-1">
                        <label class="block text-xs text-gray-500 dark:text-gray-400">Array Size</label>
                        <span id="size-value" class="text-xs text-blue-600 dark:text-blue-400 font-mono">30</span>
                    </div>
                    <input type="range" id="size-slider" min="5" max="100" value="30" class="w-full h-2 bg-gray-300 dark:bg-gray-600 rounded-lg appearance-none cursor-pointer accent-blue-500">
                </div>
                <div class="mb-5">
                    <div class="flex justify-between mb-1">
                        <label class="block text-xs text-gray-500 dark:text-gray-400">Speed</label>
                        <span id="speed-value" class="text-xs text-blue-600 dark:text-blue-400 font-mono">1x</span>
                    </div>
                    <input type="range" id="speed-slider" min="1" max="100" value="50" class="w-full h-2 bg-gray-300 dark:bg-gray-600 rounded-lg appearance-none cursor-pointer accent-green-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button id="randomize-btn" class="col-span-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-white py-2 rounded transition-colors text-sm font-medium border border-gray-300 dark:border-gray-600"><i class="fas fa-random mr-2"></i>Randomize</button>
                    <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white py-2 rounded transition-colors text-sm font-medium shadow-lg shadow-blue-500/30"><i class="fas fa-play mr-2"></i>Run</button>
                    <button id="reset-btn" class="bg-red-600 hover:bg-red-500 text-white py-2 rounded transition-colors text-sm font-medium shadow-lg shadow-red-500/30"><i class="fas fa-undo mr-2"></i>Reset</button>
                </div>
            </div>

            <!-- Visual Debugger & Stats -->
            <div class="p-6 flex-1 flex flex-col gap-4 overflow-y-auto">
                <div>
                    <h2 class="text-sm uppercase text-gray-500 dark:text-gray-400 font-semibold mb-2">Live Statistics</h2>
                    <div class="space-y-2">
                         <div class="bg-gray-100 dark:bg-gray-700/50 p-2 rounded border border-gray-200 dark:border-gray-600 flex justify-between">
                            <span class="text-xs text-gray-600 dark:text-gray-400">Comparisons</span>
                            <span id="stats-comparisons" class="font-mono font-bold text-yellow-600 dark:text-yellow-400">0</span>
                        </div>
                        <div class="bg-gray-100 dark:bg-gray-700/50 p-2 rounded border border-gray-200 dark:border-gray-600 flex justify-between">
                            <span class="text-xs text-gray-600 dark:text-gray-400">Swaps</span>
                            <span id="stats-swaps" class="font-mono font-bold text-red-600 dark:text-red-400">0</span>
                        </div>
                        <div class="bg-gray-100 dark:bg-gray-700/50 p-2 rounded border border-gray-200 dark:border-gray-600">
                            <div class="text-xs text-gray-600 dark:text-gray-400 mb-1">Current State</div>
                            <div id="stats-state" class="text-sm text-gray-800 dark:text-gray-200">Idle</div>
                        </div>
                    </div>
                </div>

                <!-- Complexity Display -->
                <div>
                    <h2 class="text-sm uppercase text-gray-500 dark:text-gray-400 font-semibold mb-2">Complexity</h2>
                    <div class="bg-gray-100 dark:bg-gray-700/50 p-3 rounded border border-gray-200 dark:border-gray-600 flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-600 dark:text-gray-400">Time (Worst)</span>
                            <span id="complexity-time" class="font-mono font-bold text-blue-600 dark:text-blue-400 text-xs">O(n)</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-600 dark:text-gray-400">Space</span>
                            <span id="complexity-space" class="font-mono font-bold text-green-600 dark:text-green-400 text-xs">O(1)</span>
                        </div>
                    </div>
                </div>

                <!-- Variables Inspector -->
                <div class="flex-1 flex flex-col min-h-[150px]">
                    <h2 class="text-sm uppercase text-gray-500 dark:text-gray-400 font-semibold mb-2">Variables</h2>
                    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded p-2 flex-1 overflow-y-auto font-mono text-xs text-gray-800 dark:text-gray-300" id="variables-display">
                        <!-- Variables injected here -->
                    </div>
                </div>

                <!-- Call Stack -->
                <div class="flex-1 flex flex-col min-h-[100px]">
                    <h2 class="text-sm uppercase text-gray-500 dark:text-gray-400 font-semibold mb-2">Call Stack</h2>
                    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded p-2 flex-1 overflow-y-auto font-mono text-xs text-gray-800 dark:text-gray-300" id="callstack-display">
                        <!-- Call Stack injected here -->
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-white dark:bg-gray-900 transition-colors duration-300">
            <div class="flex-1 flex items-center justify-center p-4 relative" id="canvas-container">
                <canvas id="visualizer-canvas" class="shadow-2xl rounded bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 w-full h-full"></canvas>
            </div>
             <div class="h-16 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex items-center justify-center gap-4 px-6 z-10 transition-colors duration-300">
                <button id="prev-step-btn" class="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 flex items-center justify-center transition-colors text-gray-600 dark:text-gray-300"><i class="fas fa-step-backward"></i></button>
                <button id="play-pause-btn" class="w-12 h-12 rounded-full bg-blue-600 hover:bg-blue-500 flex items-center justify-center transition-colors text-white shadow-lg shadow-blue-500/30"><i class="fas fa-play"></i></button>
                <button id="next-step-btn" class="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 flex items-center justify-center transition-colors text-gray-600 dark:text-gray-300"><i class="fas fa-step-forward"></i></button>
                <div class="ml-4 w-64">
                    <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Progress</label>
                    <input type="range" id="progress-slider" min="0" max="100" value="0" class="w-full h-1 bg-gray-300 dark:bg-gray-600 rounded-lg appearance-none cursor-pointer accent-blue-500" disabled>
                </div>
            </div>

            <!-- Code Panel -->
             <div id="code-panel" class="absolute top-4 right-4 w-96 bg-white/95 dark:bg-gray-800/95 backdrop-blur-sm border border-gray-200 dark:border-gray-600 rounded shadow-2xl p-4 transition-transform transform translate-x-full md:translate-x-0 z-20 flex flex-col max-h-[90%]">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-sm text-gray-800 dark:text-gray-200">Execution Trace</h3>
                    <button id="toggle-code-btn" class="text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="text-xs font-mono bg-gray-50 dark:bg-gray-900 p-2 rounded text-gray-800 dark:text-gray-300 overflow-y-auto border border-gray-200 dark:border-gray-700 flex-1 relative" id="code-display">
                    <!-- Code injected here line-by-line -->
                </div>
                <p id="algo-desc" class="mt-3 text-xs text-gray-600 dark:text-gray-400 leading-relaxed"></p>
            </div>
        </main>
    </div>

    <script type="module">
        import Navbar from './src/components/Navbar.js';
        import VisualizerController from './src/controller/VisualizerController.js';
        new Navbar();
        new VisualizerController();

        // Handle Landing Page Overlay
        const enterBtn = document.getElementById('enter-app-btn');
        const heroOverlay = document.getElementById('landing-hero');
        if (enterBtn && heroOverlay) {
            enterBtn.addEventListener('click', () => {
                heroOverlay.classList.add('opacity-0');
                setTimeout(() => heroOverlay.remove(), 700); // match transition duration
            });
        }
    </script>
</body>
</html>
